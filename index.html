  <!-- Single Page Apps for GitHub Pages URL restoration -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      } else if (l.search.slice(1, 3) === 'p=') {
        var path = l.search.match(/[?&]p=([^&]*)/);
        if (path && path[1]) {
          var query = l.search.match(/[?&]q=([^&]*)/);
          var finalPath = '/' + decodeURIComponent(path[1]).replace(/~and~/g, '&');
          if (query && query[1]) {
            finalPath += '?' + decodeURIComponent(query[1]).replace(/~and~/g, '&');
          }
          finalPath += l.hash;
          window.history.replaceState(null, null, finalPath);
        }
      }
    }(window.location));
  </script>
